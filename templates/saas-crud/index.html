<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{APP_NAME}}</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: Arial, sans-serif; margin: 24px; background: #0b1021; color: #eaf0ff; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .pill { display: inline-block; padding: 6px 12px; border-radius: 999px; background: #1f2a44; margin: 4px 4px 0 0; }
    .card { background: #111a32; border: 1px solid #1f2a44; border-radius: 12px; padding: 16px; margin: 16px 0; }
    code { background: #0d1326; padding: 2px 6px; border-radius: 4px; }
    h1,h2,h3 { margin: 0 0 10px 0; }
    ul { padding-left: 18px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>{{APP_NAME}}</h1>
      <p>Mode: <code>{{MODE}}</code> · Channel: <code>{{CHANNEL}}</code></p>
    </div>
    <div>
      <span class="pill">Template: SaaS CRUD</span>
    </div>
  </header>

  <div class="card">
    <h3>Modules ({{MODULE_COUNT}})</h3>
    <div>{{MODULE_PILLS}}</div>
  </div>

  <div class="card">
    <h3>Features</h3>
    <div>{{FEATURE_PILLS}}</div>
  </div>

  <div class="card">
    <h3>Acceptance Tests</h3>
    <ul>{{TEST_LIST}}</ul>
  </div>

  <div class="card">
    <h3>System Design (abridged)</h3>
    <p>Services: {{SERVICES}}</p>
    <p>Auth: {{AUTH}}</p>
  </div>
</body>
</html>
